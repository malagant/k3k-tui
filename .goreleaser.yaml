version: 2

project_name: k3k-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: k3k-tui
    binary: k3k-tui
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commitHash={{ .ShortCommit }}
      - -X main.buildTime={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "📦 Other"
      order: 999

release:
  github:
    owner: malagant
    name: k3k-tui
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
  header: |
    ## k3k-tui v{{ .Version }}

    Terminal UI for managing k3k (Kubernetes-in-Kubernetes) virtual clusters.

    ### Installation

    **Homebrew (macOS/Linux):**
    ```bash
    brew install malagant/tap/k3k-tui
    ```

    **Download binary:**
    Download the archive for your platform below, extract, and place `k3k-tui` in your `$PATH`.
  footer: |
    **Full Changelog**: https://github.com/malagant/k3k-tui/compare/{{ .PreviousTag }}...{{ .Tag }}

